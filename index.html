<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fan Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- Single Card Video Home Screen -->
    <div id="welcomeScreen" class="welcome-container">

        <!-- Background Image -->
        <img src="vidsunset.jpg" class="welcome-video" alt="Background Sunset">

        <!-- Overlay Gradient for Readability -->
        <div class="video-overlay"></div>

        <!-- Typography / Content -->
        <div class="welcome-text">
            <h1>Control<br>Fan in<br>One Place</h1>
        </div>

        <!-- Interactive Swipe Toggle (Centered) -->
        <div class="swipe-wrapper">
            <div class="swipe-track" id="swipeTrack">
                <!-- Animated background glow -->
                <div class="swipe-glow"></div>

                <div class="swipe-thumb" id="swipeThumb">
                    <svg width="14" height="16" viewBox="0 0 14 16" fill="black" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M13.5 7.13397C14.1667 7.51887 14.1667 8.48113 13.5 8.86603L2.25 15.3615C1.58333 15.7464 0.75 15.2653 0.75 14.4955L0.75 1.50449C0.75 0.734689 1.58333 0.253564 2.25 0.638466L13.5 7.13397Z" />
                    </svg>
                </div>
                <span class="swipe-text" id="swipeText">Start</span>
                <span class="swipe-arrows">›››</span>
            </div>
        </div>

    </div>

    <!-- Main Dashboard -->
    <div id="appContainer" class="app-container hidden">
        <!-- Wind Animation Overlay -->
        <div class="wind-lines" id="windOverlay">
            <div class="wind-line w1"></div>
            <div class="wind-line w2"></div>
            <div class="wind-line w3"></div>
            <div class="wind-line w4"></div>
        </div>

        <!-- Left Panel: Integrated Fan & Power -->
        <section class="dashboard-visuals">
            <header class="visual-header">
                <button id="backBtn" class="back-btn" aria-label="Go Back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </button>
                <div class="titles">
                    <h1>Smart<span>Fan</span></h1>
                    <div class="sub-header">
                        <p>Control Device</p>
                    </div>
                </div>
            </header>

            <div class="fan-display">
                <div class="fan-glow"></div>
                <div class="fan-frame">
                    <div class="fan-spinner" id="fanBlades">
                        <div class="fan-blade b1"></div>
                        <div class="fan-blade b2"></div>
                        <div class="fan-blade b3"></div>
                        <div class="fan-hub"></div>
                    </div>
                </div>
            </div>

            <!-- Modern Power Control -->
            <div class="power-control-wrapper">
                <div class="power-card">
                    <div class="power-info">
                        <h3>Device Power</h3>
                        <p id="statusLabel">Standby</p>
                    </div>
                    <button id="powerSwitch" class="power-toggle off">
                        <div class="toggle-knob">
                            <svg class="p-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18.36 6.64a9 9 0 1 1-12.73 0" />
                                <line x1="12" y1="2" x2="12" y2="12" />
                            </svg>
                        </div>
                    </button>
                </div>
            </div>
        </section>

        <div class="dashboard-content">
            <!-- Environment Stats -->
            <section class="dashboard-stats">
                <div class="data-group">
                    <h3 class="data-section-title">Environment</h3>
                    <div class="stat-item temp-card">
                        <div class="stat-icon temp-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" />
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h4>Room Temperature</h4>
                            <div class="value"><span id="tempValue">24.5</span><span class="unit">°C</span></div>
                        </div>
                        <div class="temp-graph">
                            <svg viewBox="0 0 100 30" class="sparkline">
                                <path d="M0 15 L 25 15 L 50 15 L 75 15 L 100 15" fill="none" stroke="#3B82F6"
                                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                                    id="tempSparkline" />
                            </svg>
                        </div>
                    </div>
                </div>
            </section>

            <!-- History Sidebar -->
            <section class="dashboard-history">
                <div class="history-header">
                    <h3 class="data-section-title">Recent Activity</h3>
                </div>
                <div class="history-container" id="historyList">
                    <!-- History items via JS -->
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
