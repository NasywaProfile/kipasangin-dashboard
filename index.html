<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fan Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Welcome Homepage -->
    <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-icon">🌀</div>
        <h1>Smart<span>Fan</span></h1>
        <p>Control your environment with elegance. Experience the perfect breeze.</p>
        <button id="startBtn" class="start-btn">Get Started</button>
    </div>

    <!-- Main Dashboard -->
    <div id="appContainer" class="app-container hidden">
        <!-- Left Panel: Integrated Fan & Controls -->
        <section class="dashboard-visuals">
            <header class="visual-header">
                <h1>Smart<span>Fan</span></h1>
                <p>Living Room Device</p>
            </header>

            <div class="fan-display">
                <div class="fan-glow"></div>
                <div class="fan-frame">
                    <div class="fan-spinner" id="fanBlades">
                        <div class="fan-blade b1"></div>
                        <div class="fan-blade b2"></div>
                        <div class="fan-blade b3"></div>
                        <div class="fan-hub"></div>
                    </div>
                </div>
            </div>

            <!-- Integrated Controls in One Frame -->
            <div class="integrated-controls">
                <button id="powerSwitch" class="power-btn off">
                    <div class="icon-circle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
                    </div>
                    <span id="statusLabel">Standby</span>
                </button>

                <div class="slider-box">
                    <label>Intensity</label>
                    <input type="range" class="slider" id="speedSlider" min="0" max="100" value="0">
                    <div class="slider-val"><span id="speedValue">0</span>%</div>
                </div>
            </div>
        </section>

        <!-- Right Panel: Analytics & History -->
        <section class="dashboard-data">
            <div class="data-group">
                <h3 class="data-section-title">Current State</h3>
                <div class="stat-item">
                    <div class="stat-icon">🌡️</div>
                    <div class="stat-info">
                        <h4>Temperature</h4>
                        <div class="value"><span id="tempValue">24.5</span>°C</div>
                    </div>
                </div>
            </div>

            <div class="data-group history-group">
                <h3 class="data-section-title">Recent Activity</h3>
                <div class="history-container" id="historyList">
                    <!-- History items -->
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
