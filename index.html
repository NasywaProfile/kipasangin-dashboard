<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fan Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Welcome Homepage -->
    <div id="welcomeScreen" class="welcome-screen">
        <div class="bg-gradient-anim"></div>
        <div class="welcome-content">
            <div class="hero-fan-icon">
                <div class="hf-hub"></div>
                <div class="hf-blade hfb1"></div>
                <div class="hf-blade hfb2"></div>
                <div class="hf-blade hfb3"></div>
            </div>
            <h1 class="fade-up-1">Smart<span>Fan</span></h1>
            <p class="fade-up-2">Next-generation atmospheric control.<br>Minimalist, elegant, and intelligent.</p>
            <button id="startBtn" class="start-btn fade-up-3">
                Access Dashboard
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="appContainer" class="app-container hidden">
        <!-- Wind Animation Overlay -->
        <div class="wind-lines" id="windOverlay">
            <div class="wind-line w1"></div>
            <div class="wind-line w2"></div>
            <div class="wind-line w3"></div>
            <div class="wind-line w4"></div>
        </div>

        <!-- Left Panel: Integrated Fan & Power -->
        <section class="dashboard-visuals">
            <header class="visual-header">
                <button id="backBtn" class="back-btn" aria-label="Go Back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </button>
                <div class="titles">
                    <h1>Smart<span>Fan</span></h1>
                    <div class="sub-header">
                        <p>Control Device</p>
                        <div class="header-temp"><span id="headerTempValue">24.5</span>°C</div>
                    </div>
                </div>
            </header>

            <div class="fan-display">
                <div class="fan-glow"></div>
                <div class="fan-frame">
                    <div class="fan-spinner" id="fanBlades">
                        <div class="fan-blade b1"></div>
                        <div class="fan-blade b2"></div>
                        <div class="fan-blade b3"></div>
                        <div class="fan-hub"></div>
                    </div>
                </div>
            </div>

            <!-- Modern Power Control -->
            <div class="power-control-wrapper">
                <div class="power-card">
                    <div class="power-info">
                        <h3>Device Power</h3>
                        <p id="statusLabel">Standby</p>
                    </div>
                    <button id="powerSwitch" class="power-toggle off">
                        <div class="toggle-knob">
                            <svg class="p-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18.36 6.64a9 9 0 1 1-12.73 0" />
                                <line x1="12" y1="2" x2="12" y2="12" />
                            </svg>
                        </div>
                    </button>
                </div>
            </div>
        </section>

        <!-- Middle Panel: Environment Stats -->
        <section class="dashboard-stats">
            <div class="data-group">
                <h3 class="data-section-title">Environment</h3>
                <div class="stat-item temp-card">
                    <div class="stat-icon temp-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h4>Room Temperature</h4>
                        <div class="value"><span id="tempValue">24.5</span><span class="unit">°C</span></div>
                    </div>
                    <div class="temp-graph">
                        <svg viewBox="0 0 100 30" class="sparkline">
                            <path d="M0 15 L 25 15 L 50 15 L 75 15 L 100 15" fill="none" stroke="#3B82F6"
                                stroke-width="3" stroke-linecap="round" stroke-linejoin="round" id="tempSparkline" />
                        </svg>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Panel: History Sidebar -->
        <section class="dashboard-history">
            <div class="history-header">
                <h3 class="data-section-title">Recent Activity</h3>
                <span class="history-count" id="historyCount">0</span>
            </div>
            <div class="history-container" id="historyList">
                <!-- History items via JS -->
            </div>
        </section>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
