<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fan Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- Single Card Video Home Screen -->
    <div id="welcomeScreen" class="welcome-container">

        <!-- Background Image -->
        <img src="vidsunset.png" class="welcome-video" alt="Living Room with Fan Landscape">

        <!-- Overlay Gradient for Readability -->
        <div class="video-overlay"></div>

        <!-- Typography / Content -->
        <div class="welcome-text">
            <h1>Smart Fan<br>Experience</h1>
            <p class="welcome-subtitle">Seamless comfort for your living space</p>
        </div>

        <!-- Elegant Glass Button -->
        <div class="start-btn-wrapper">
            <button id="startBtn" class="glass-start-btn">
                <span>Start Experience</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>

    </div>

    <!-- Main Dashboard -->
    <div id="appContainer" class="app-container hidden">
        <!-- Wind Animation Overlay -->
        <div class="wind-lines" id="windOverlay">
            <div class="wind-line w1"></div>
            <div class="wind-line w2"></div>
            <div class="wind-line w3"></div>
            <div class="wind-line w4"></div>
        </div>

        <!-- Left Panel: Integrated Fan & Power -->
        <section class="dashboard-visuals">
            <header class="visual-header">
                <button id="backBtn" class="back-btn" aria-label="Go Back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </button>
                <div class="titles">
                    <div class="title-row">
                        <h1>Smart<span>Fan</span></h1>
                        <button id="connectSerial" class="connect-btn" title="Connect Arduino">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                            </svg>
                            <span>Connect</span>
                        </button>
                    </div>
                    <div class="sub-header">
                        <p>Control Device</p>
                    </div>
                </div>
            </header>

            <div class="fan-display">
                <div class="fan-glow"></div>
                <div class="fan-frame">
                    <div class="fan-spinner" id="fanBlades">
                        <div class="fan-blade b1"></div>
                        <div class="fan-blade b2"></div>
                        <div class="fan-blade b3"></div>
                        <div class="fan-hub"></div>
                    </div>
                </div>
            </div>

            <!-- Modern Power Control -->
            <div class="power-control-wrapper">
                <div class="power-card">
                    <div class="power-info">
                        <h3>Device Power</h3>
                        <p id="statusLabel">Standby</p>
                    </div>
                    <button id="powerSwitch" class="power-toggle off">
                        <div class="toggle-knob">
                            <svg class="p-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18.36 6.64a9 9 0 1 1-12.73 0" />
                                <line x1="12" y1="2" x2="12" y2="12" />
                            </svg>
                        </div>
                    </button>
                </div>
            </div>
        </section>

        <div class="dashboard-content glass-theme">
            <!-- Left Side of Right Panel: Activity -->
            <section class="activity-column">
                <div class="glass-section-header">
                    <div class="header-titles">
                        <h3>Activity</h3>
                        <p class="header-date" id="currentDate">July 31, 2025</p>
                    </div>
                    <button class="see-all-btn">See all <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></button>
                </div>
                
                <div class="timeline-container" id="historyList">
                    <!-- History items will be styled as timeline cards -->
                </div>
            </section>

            <!-- Right Side of Right Panel: Controls & Stats -->
            <section class="controls-column">
                <!-- Circular Temperature Control -->
                <div class="glass-card dial-card">
                    <div class="card-label">
                        <h4>Automation</h4>
                        <p>Living room</p>
                    </div>
                    
                    <div class="dial-container">
                        <div class="dial-outer">
                            <div class="dial-ticks" id="dialTicks"></div>
                            <div class="dial-inner">
                                <div class="dial-info">
                                    <p>Auto-ON at</p>
                                    <div class="dial-value"><span id="thresholdLabel">32.0</span>°</div>
                                    <p class="dial-status">Active Mode</p>
                                </div>
                            </div>
                            <div class="dial-handle" id="dialHandle"></div>
                        </div>
                        <input type="range" id="thresholdSlider" min="15" max="35" step="0.5" value="32" class="hidden-input">
                    </div>
                    
                    <div class="dial-footer">
                        <span class="range-min">15°</span>
                        <div class="footer-controls">
                            <button class="dial-btn" id="tempDown"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                            <button class="dial-btn" id="tempUp"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                        </div>
                        <span class="range-max">35°</span>
                    </div>
                </div>

                <!-- Room Environment Card -->
                <div class="glass-card env-card">
                    <div class="env-info">
                        <div class="env-text">
                            <h4>Room Temperature</h4>
                            <div class="env-main-val"><span id="tempValue">24.5</span>°C</div>
                        </div>
                        <div class="env-status-icon">
                            <div class="status-glow"></div>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" /></svg>
                        </div>
                    </div>
                    <div class="env-graph-box">
                        <svg viewBox="0 0 100 40" class="env-sparkline">
                            <path d="M0 20 L 25 20 L 50 20 L 75 20 L 100 20" fill="none" stroke="#FACD15" stroke-width="3" stroke-linecap="round" id="tempSparkline" />
                        </svg>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
