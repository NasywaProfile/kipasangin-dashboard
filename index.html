<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fan Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <!-- Single Card Video Home Screen -->
    <div id="welcomeScreen" class="welcome-container">

        <!-- Background Image -->
        <img src="vidsunset.png" class="welcome-video" alt="Living Room with Fan Landscape">

        <!-- Overlay Gradient for Readability -->
        <div class="video-overlay"></div>

        <!-- Typography / Content -->
        <div class="welcome-text">
            <h1>Smart Fan<br>Experience</h1>
            <p class="welcome-subtitle">Seamless comfort for your living space</p>
        </div>

        <!-- Elegant Glass Button -->
        <div class="start-btn-wrapper">
            <button id="startBtn" class="glass-start-btn">
                <span>Start Experience</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>

    </div>

    <!-- Main Dashboard -->
    <div id="appContainer" class="app-container hidden">
        <!-- Wind Animation Overlay -->
        <div class="wind-lines" id="windOverlay">
            <div class="wind-line w1"></div>
            <div class="wind-line w2"></div>
            <div class="wind-line w3"></div>
            <div class="wind-line w4"></div>
        </div>

        <!-- Left Panel: Integrated Fan & Power -->
        <section class="dashboard-visuals">
            <header class="visual-header">
                <button id="backBtn" class="back-btn" aria-label="Go Back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </button>
                <div class="titles">
                    <div class="title-row">
                        <h1>Smart<span>Fan</span></h1>
                        <button id="connectSerial" class="connect-btn" title="Connect Arduino">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                            </svg>
                            <span>Connect</span>
                        </button>
                    </div>
                    <div class="sub-header">
                        <p>Control Device</p>
                    </div>
                </div>
            </header>

            <div class="fan-display">
                <div class="fan-glow"></div>
                <div class="fan-frame">
                    <div class="fan-spinner" id="fanBlades">
                        <div class="fan-blade b1"></div>
                        <div class="fan-blade b2"></div>
                        <div class="fan-blade b3"></div>
                        <div class="fan-hub"></div>
                    </div>
                </div>
            </div>

            <!-- Modern Power Control -->
            <div class="power-control-wrapper">
                <div class="power-card">
                    <div class="power-info">
                        <h3>Device Power</h3>
                        <p id="statusLabel">Standby</p>
                    </div>
                    <button id="powerSwitch" class="power-toggle off">
                        <div class="toggle-knob">
                            <svg class="p-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18.36 6.64a9 9 0 1 1-12.73 0" />
                                <line x1="12" y1="2" x2="12" y2="12" />
                            </svg>
                        </div>
                    </button>
                </div>
                <!-- Auto Mode Toggle -->
                <div class="auto-mode-card">
                    <div class="power-info">
                        <h3>Auto Mode</h3>
                        <p id="autoLabel">Disabled</p>
                    </div>
                    <button id="autoSwitch" class="auto-toggle off">
                        <div class="toggle-knob"></div>
                    </button>
                </div>
            </div>
        </section>

        <div class="dashboard-content">
            <!-- Environment Stats -->
            <section class="dashboard-stats">
                <div class="data-group">
                    <h3 class="data-section-title">Environment</h3>
                    <div class="stat-item temp-card">
                        <div class="stat-icon temp-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" />
                            </svg>
                        </div>
                        <div class="stat-info">
                            <h4>Room Temperature</h4>
                            <div class="value"><span id="tempValue">24.5</span><span class="unit">°C</span></div>
                        </div>
                        <div class="temp-graph">
                            <svg viewBox="0 0 100 30" class="sparkline">
                                <path d="M0 15 L 25 15 L 50 15 L 75 15 L 100 15" fill="none" stroke="#A67347"
                                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                                    id="tempSparkline" />
                            </svg>
                        </div>
                    </div>
                </div>
            </section>

            <!-- History Sidebar -->
            <section class="dashboard-history">
                <div class="history-header">
                    <h3 class="data-section-title">Recent Activity</h3>
                </div>
                <div class="history-container" id="historyList">
                    <!-- History items via JS -->
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
